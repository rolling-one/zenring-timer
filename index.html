
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>ZenRing Timer</title>
    <link rel="icon" href="/favicon.svg?v=2" type="image/svg+xml" />
    
    <!-- 预连接字体服务器，提高加载速度 -->
    <link rel="preconnect" href="https://fonts.loli.net">
    <link rel="preconnect" href="https://gstatic.loli.net" crossorigin>
    
    <!-- 引入 Tailwind CSS (CDN 版本) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // 配置 Tailwind 主题，添加自定义断点
        tailwind.config = {
            theme: {
                extend: {
                    screens: {
                        'md': '700px', // 自定义中等屏幕断点
                    }
                }
            }
        }
    </script>
    
    <!-- 引入 Google Fonts 字体 -->
    <link href="https://fonts.loli.net/css2?family=Inter:wght@100;300;400;500;600&family=Azeret+Mono:wght@100;200;300;400&family=Noto+Serif+SC:wght@300;400;500&family=Quicksand:wght@300;400;500&display=block" rel="stylesheet">
    
    <style>
        /* 全局样式定义 */
        html, body {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; /* 禁止页面滚动 */
            overscroll-behavior: none; /* 防止橡皮筋效果露出背景 */
            background-color: #000000; /* 默认设为黑色，防止全屏切换时闪白边 */
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            opacity: 0; /* 初始透明，等待字体加载后显示 */
            transition: opacity 0.5s ease;
        }
        
        /* 字体加载完成后的类 */
        body.fonts-loaded {
            opacity: 1;
        }

        .font-quicksand {
            font-family: 'Quicksand', sans-serif;
        }

        /* 核心修复：使用真正的等宽字体 Azeret Mono 彻底消除数字晃动 */
        .tabular-nums {
            font-family: 'Azeret Mono', monospace;
            font-variant-numeric: tabular-nums;
            font-weight: 100;
        }

        .font-mono-tech {
            font-family: 'Azeret Mono', monospace;
            font-weight: 100;
        }

        /* 平滑的颜色过渡动画 */
        .stable-color-transition {
            transition-property: background-color, color;
            transition-duration: 0.5s;
            transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 禁用颜色过渡（用于某些需要立即变色的场景） */
        .no-color-transition {
            transition-property: color, background-color !important;
            transition-duration: 0s !important;
            transition-delay: 0s !important;
        }

        /* 透明度过渡动画 */
        .fade-transition {
            transition-property: opacity !important;
            transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1) !important;
        }
    </style>

    <script>
        // 字体加载检测逻辑：防止字体未加载完成时的布局闪烁 (FOIT)
        if ('fonts' in document) {
            document.fonts.ready.then(function () {
                document.body.classList.add('fonts-loaded');
            });
            // 兜底方案：1.5秒后强制显示，防止字体服务器挂掉导致页面空白
            setTimeout(function() {
                document.body.classList.add('fonts-loaded');
            }, 1500);
        } else {
            // 兼容旧浏览器
            document.addEventListener('DOMContentLoaded', function() {
                document.body.classList.add('fonts-loaded');
            });
        }
    </script>

    <!-- 模块导入映射，用于在浏览器中直接运行 ESM 模块 -->
    <script type="importmap">
    {
      "imports": {
        "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
        "react/": "https://esm.sh/react@^19.2.4/",
        "react": "https://esm.sh/react@^19.2.4",
        "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
      }
    }
    </script>
</head>
<body>
    <!-- React 挂载点 -->
    <div id="root"></div>
    <!-- 引入 React 入口脚本 -->
    <script type="module" src="/index.tsx"></script>
</body>
</html>
