
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenRing Timer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 使用国内镜像源，引入 Azeret Mono 的细体版本 -->
    <link href="https://fonts.loli.net/css2?family=Inter:wght@300;400;500;600&family=Azeret+Mono:wght@100;200;300;400&family=Noto+Serif+SC:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #FFFFFF;
        }
        .zen-transition {
            transition: all 1s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .fade-in {
            animation: fadeIn 1s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .tabular-nums {
            /* 字体栈优化：优先使用 Azeret Mono，它在细体下展现出极具现代感且锋利的工业美学 */
            font-family: 'Azeret Mono', ui-monospace, 'SF Mono', 'Cascadia Code', 'Source Code Pro', Menlo, Monaco, Consolas, monospace;
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.05em; /* Azeret Mono 字距稍宽，需微调收紧 */
        }
    </style>
<script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "react/": "https://esm.sh/react@^19.2.4/",

    "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>

</body>
</html>
